name: Refresh event sources

on:
  schedule:
    # 13:00 UTC is 6:00 AM Pacific daylight time.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: event-source-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Refresh deterministic sources
        id: refresh
        continue-on-error: true
        run: npm run refresh -- --write --strict

      - name: Validate published data
        id: verify
        if: always()
        continue-on-error: true
        run: npm run verify

      - name: Preserve refresh report
        id: artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: event-refresh-report
          path: data/refresh-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Summarize refresh
        if: always()
        shell: bash
        run: |
          confirmed="$(jq '.confirmed | length' data/refresh-report.json)"
          changed="$(jq '.changed | length' data/refresh-report.json)"
          reviews="$(jq '.needsReview | length' data/refresh-report.json)"
          failures="$(jq '.failures | length' data/refresh-report.json)"
          {
            echo "## Event refresh"
            echo "- Confirmed monitors: $confirmed"
            echo "- Safe catalog changes: $changed"
            echo "- Ambiguous/review items: $reviews"
            echo "- Failures: $failures"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish validated catalog changes
        id: publish
        if: steps.refresh.outcome == 'success' && steps.verify.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          if git diff --quiet -- data/events.json; then
            echo "No publishable catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/refresh-report.json
          git commit -m "data: refresh official event sources"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              break
            fi
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort
              exit 1
            }
          done
          exit 1

      - name: Maintain refresh health issue
        if: always()
        shell: bash
        run: |
          failures="$(jq '.failures | length' data/refresh-report.json)"
          reviews="$(jq '.needsReview | length' data/refresh-report.json)"
          automation_failure=0
          if [ "${{ steps.refresh.outcome }}" != "success" ] || \
             [ "${{ steps.verify.outcome }}" != "success" ] || \
             [ "${{ steps.artifact.outcome }}" != "success" ] || \
             [ "${{ steps.publish.outcome }}" = "failure" ]; then
            automation_failure=1
          fi

          title="Event source refresh needs attention"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ "$failures" -gt 0 ] || [ "$reviews" -gt 0 ] || [ "$automation_failure" -gt 0 ]; then
            echo "::warning::$failures source failure(s), $reviews ambiguous item(s), automation failure=$automation_failure."
            body="Daily refresh: $failures source failure(s), $reviews ambiguous item(s), automation failure=$automation_failure. Ambiguous or invalid facts were not published. See the latest workflow run and event-refresh-report artifact."
            if [ -z "$existing" ]; then
              gh issue create --title "$title" --body "$body"
            else
              gh issue comment "$existing" --body "$body"
            fi
          else
            if [ -n "$existing" ]; then
              gh issue close "$existing" --comment "The latest daily refresh is healthy: all sources, validation, and publication checks passed."
            fi
          fi

      - name: Enforce healthy automation
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.refresh.outcome }}" != "success" ] || \
             [ "${{ steps.verify.outcome }}" != "success" ] || \
             [ "${{ steps.artifact.outcome }}" != "success" ] || \
             [ "${{ steps.publish.outcome }}" = "failure" ]; then
            exit 1
          fi
